services:
  postgres:
    image: postgres:15
    container_name: echo-pandas-postgres
    restart: unless-stopped
    # No ports: — DB is internal only, not exposed to the internet
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - ets_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel11-app
    restart: unless-stopped
    env_file: .env
    # NO bind mount — the image is fully self-contained
    # firebase JSON is copied into the image by Dockerfile (COPY . .)
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit((int)!@fsockopen(\"127.0.0.1\", 9000));'"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks:
      - ets_network

  nginx:
    image: nginx:latest
    container_name: nginx-laravel
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default-prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot
      # Nginx needs access to public/ to serve static files directly
      # We mount only the public folder from host (it's not sensitive)
      - ./public:/var/www/html/public:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - ets_network

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

volumes:
  postgres_data:

networks:
  ets_network:
    driver: bridge