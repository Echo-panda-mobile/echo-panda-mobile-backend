services:
  postgres:
    image: postgres:15
    container_name: echo-pandas-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: echo_panda_db
      POSTGRES_USER: echo_panda_user
      POSTGRES_PASSWORD: 0ZFtEz8QNp2KhTSO7RSu
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U echo_panda_user -d echo_panda_db"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - ets_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel11-app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit((int)!@fsockopen(\"127.0.0.1\", 9000));'"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 90s
    networks:
      - ets_network

  nginx:
    image: nginx:latest
    container_name: nginx-laravel
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default-prod.conf:/etc/nginx/conf.d/default.conf
      - .:/var/www/html
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      app:
        condition: service_healthy
    networks:
      - ets_network

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

volumes:
  postgres_data:

networks:
  ets_network:
    driver: bridge